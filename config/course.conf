# Vali-IT Installer — kursuse projekt (kloonitakse Windowsi poolele).
#
# Formaat:  repo-url | sihtkausta nimi %USERPROFILE% all | kirjeldus (eesti keeles)
#
# Kaustanimi tuletatakse URL-i viimasest osast:
# https://github.com/bcs-hub/bank41 -> %USERPROFILE%\vali-it\bank41
# Uue kursuse jaoks muuda ainult seda rida (bank42, bank43, ...).
# Mitu rida = mitu repot.

https://github.com/bcs-hub/bank41 | vali-it | Kursuse projekt (bank41)
